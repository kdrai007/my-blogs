{{ define "main" }}

<article class="article-wrapper">
  <header class="article-header">
    <div class="article-section-label">
      <a href="{{ .CurrentSection.RelPermalink }}">{{ .CurrentSection.Title }}</a>
    </div>
    <h1>{{ .Title }}</h1>
    <div class="article-meta">
      {{ if not .Date.IsZero }}
      <span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        {{ .Date | time.Format "January 2, 2006" }}
      </span>
      {{ end }}
      <span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        {{ .ReadingTime }} min read
      </span>
      <span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        {{ .WordCount }} words
      </span>
    </div>
  </header>

  <div class="article-content">
    {{ .Content }}
  </div>

  {{ with .Params.tags }}
  <div class="article-tags">
    {{ range . }}
      <a href="{{ "/tags/" | relURL }}{{ . | urlize }}/">#{{ . }}</a>
    {{ end }}
  </div>
  {{ end }}
</article>

{{ end }}
