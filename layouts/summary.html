<a href="{{ .RelPermalink }}" class="post-card-link">
<div class="post-card">
  {{ with .CurrentSection.Title }}
    <span class="post-card-section">{{ . }}</span>
  {{ end }}

  <h2>{{ .Title | default .LinkTitle | default "Untitled" }}</h2>

  {{ if .Summary }}
    <p class="post-card-excerpt">{{ .Summary | plainify | truncate 150 }}</p>
  {{ end }}

  <div class="post-card-meta">
    {{ if not .Date.IsZero }}
    <span>
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      {{ .Date | time.Format "Jan 2, 2006" }}
    </span>
    {{ end }}
    <span>{{ .ReadingTime }} min read</span>
  </div>
</div>
</a>
