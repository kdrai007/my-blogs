{{/* Search Modal — CLI-style search overlay */}}
<div class="search-overlay" id="search-overlay">
  <div class="search-modal">
    <div class="search-header">
      <span class="search-prompt">&gt; search:</span>
      <input type="text" id="search-input" class="search-input" placeholder="type to search posts and folders..."
        autocomplete="off" spellcheck="false">
      <button class="search-close" id="search-close">[ESC]</button>
    </div>
    <div class="search-results" id="search-results">
      <div class="search-empty">
        <p>// Type to search across all posts and sections</p>
        <p class="text-muted">// Press <kbd>↑</kbd> <kbd>↓</kbd> to navigate, <kbd>Enter</kbd> to open</p>
      </div>
    </div>
    <div class="search-footer">
      <span class="text-muted">Ctrl+K to toggle</span>
      <span class="search-count" id="search-count"></span>
    </div>
  </div>
</div>

<script>
  (function () {
    var overlay = document.getElementById('search-overlay');
    var input = document.getElementById('search-input');
    var resultsEl = document.getElementById('search-results');
    var countEl = document.getElementById('search-count');
    var closeBtn = document.getElementById('search-close');
    var searchData = null;
    var selectedIndex = -1;

    var SEARCH_INDEX_URL = '{{ "index.json" | absURL }}';

    // Load search index
    function loadIndex() {
      if (searchData) return Promise.resolve(searchData);
      return fetch(SEARCH_INDEX_URL)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          searchData = data;
          return data;
        });
    }

    // Fuzzy match
    function fuzzyMatch(text, query) {
      if (!text || !query) return false;
      text = text.toLowerCase();
      query = query.toLowerCase();
      if (text.indexOf(query) !== -1) return true;

      // Simple fuzzy: all query chars appear in order
      var qi = 0;
      for (var i = 0; i < text.length && qi < query.length; i++) {
        if (text[i] === query[qi]) qi++;
      }
      return qi === query.length;
    }

    // Score a match (lower is better)
    function scoreMatch(item, query) {
      var q = query.toLowerCase();
      var title = (item.title || '').toLowerCase();

      // Exact title match
      if (title === q) return 0;
      // Title starts with query
      if (title.indexOf(q) === 0) return 1;
      // Title contains query
      if (title.indexOf(q) !== -1) return 2;
      // Section match
      if (item.section && item.section.toLowerCase().indexOf(q) !== -1) return 3;
      // Content match
      if (item.content && item.content.toLowerCase().indexOf(q) !== -1) return 4;
      // Fuzzy
      return 5;
    }

    function search(query) {
      if (!searchData || !query || query.length < 2) {
        resultsEl.innerHTML = '<div class="search-empty"><p>// Type to search across all posts and sections</p><p class="text-muted">// Press <kbd>↑</kbd> <kbd>↓</kbd> to navigate, <kbd>Enter</kbd> to open</p></div>';
        countEl.textContent = '';
        selectedIndex = -1;
        return;
      }

      var results = [];

      // Search sections
      if (searchData.sections) {
        searchData.sections.forEach(function (s) {
          if (fuzzyMatch(s.title, query)) {
            results.push({
              title: s.title,
              url: s.url,
              type: 'section',
              meta: (s.pageCount || 0) + ' posts',
              parent: s.parent || '',
              score: scoreMatch(s, query)
            });
          }
        });
      }

      // Search pages
      if (searchData.pages) {
        searchData.pages.forEach(function (p) {
          if (fuzzyMatch(p.title, query) || fuzzyMatch(p.section, query) || fuzzyMatch(p.content, query)) {
            results.push({
              title: p.title,
              url: p.url,
              type: 'page',
              section: p.section || '',
              meta: p.date + ' | ' + p.readingTime + 'min',
              content: p.content ? p.content.substring(0, 100) : '',
              score: scoreMatch(p, query)
            });
          }
        });
      }

      // Sort by score
      results.sort(function (a, b) { return a.score - b.score; });

      // Limit
      results = results.slice(0, 20);

      selectedIndex = results.length > 0 ? 0 : -1;
      countEl.textContent = '[ ' + results.length + ' results ]';

      if (results.length === 0) {
        resultsEl.innerHTML = '<div class="search-empty"><p>// No results for "' + escapeHtml(query) + '"</p></div>';
        return;
      }

      var html = '';
      results.forEach(function (r, i) {
        var icon = r.type === 'section' ? '[DIR]' : '[FILE]';
        var iconClass = r.type === 'section' ? 'text-secondary' : 'text-primary';
        var sectionLabel = r.section ? '<span class="search-result-section">// ' + escapeHtml(r.section) + '</span>' : '';
        if (r.type === 'section' && r.parent) {
          sectionLabel = '<span class="search-result-section">// ' + escapeHtml(r.parent) + '</span>';
        }
        var contentSnippet = r.content ? '<p class="search-result-snippet">' + escapeHtml(r.content) + '…</p>' : '';

        html += '<a href="' + r.url + '" class="search-result' + (i === 0 ? ' search-result-active' : '') + '" data-index="' + i + '">'
          + '<div class="search-result-left">'
          + '<span class="search-result-icon ' + iconClass + '">' + icon + '</span>'
          + '<div class="search-result-info">'
          + '<span class="search-result-title">' + highlightMatch(r.title, query) + '</span>'
          + sectionLabel
          + contentSnippet
          + '</div>'
          + '</div>'
          + '<span class="search-result-meta">' + escapeHtml(r.meta) + '</span>'
          + '</a>';
      });

      resultsEl.innerHTML = html;
    }

    function highlightMatch(text, query) {
      if (!text || !query) return escapeHtml(text || '');
      var escaped = escapeHtml(text);
      var q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      var regex = new RegExp('(' + q + ')', 'gi');
      return escaped.replace(regex, '<mark>$1</mark>');
    }

    function escapeHtml(s) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(s));
      return div.innerHTML;
    }

    function updateSelection(newIndex) {
      var items = resultsEl.querySelectorAll('.search-result');
      if (items.length === 0) return;
      newIndex = Math.max(0, Math.min(newIndex, items.length - 1));

      items.forEach(function (el) { el.classList.remove('search-result-active'); });
      items[newIndex].classList.add('search-result-active');
      items[newIndex].scrollIntoView({ block: 'nearest' });
      selectedIndex = newIndex;
    }

    function openSearch() {
      overlay.classList.add('search-open');
      loadIndex();
      input.value = '';
      input.focus();
      search('');
      document.body.style.overflow = 'hidden';
    }

    function closeSearch() {
      overlay.classList.remove('search-open');
      document.body.style.overflow = '';
    }

    // Event listeners
    input.addEventListener('input', function () { search(this.value.trim()); });

    input.addEventListener('keydown', function (e) {
      var items = resultsEl.querySelectorAll('.search-result');
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        updateSelection(selectedIndex + 1);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        updateSelection(selectedIndex - 1);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (items[selectedIndex]) {
          window.location.href = items[selectedIndex].getAttribute('href');
        }
      } else if (e.key === 'Escape') {
        closeSearch();
      }
    });

    closeBtn.addEventListener('click', closeSearch);
    overlay.addEventListener('click', function (e) {
      if (e.target === overlay) closeSearch();
    });

    // Ctrl+K / Cmd+K shortcut
    document.addEventListener('keydown', function (e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        if (overlay.classList.contains('search-open')) {
          closeSearch();
        } else {
          openSearch();
        }
      }
      if (e.key === 'Escape' && overlay.classList.contains('search-open')) {
        closeSearch();
      }
    });

    // Nav search button
    var searchBtn = document.getElementById('search-trigger');
    if (searchBtn) searchBtn.addEventListener('click', openSearch);
  })();
</script>
